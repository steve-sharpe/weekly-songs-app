<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact The Hulk Caesar Show</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Special Elite', monospace;
      background:
        radial-gradient(circle at top, rgba(255,235,59,0.12), transparent 35%),
        linear-gradient(180deg, #e52b20 0%, #c91f17 100%);
      color: #111;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(760px, 100%);
      background: #f5f1e8;
      border: 6px solid #111;
      box-shadow: 12px 12px 0 #000;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-family: 'Permanent Marker', cursive;
      font-size: clamp(1.3rem, 4.2vw, 3rem);
      line-height: 1;
      white-space: nowrap;
      text-transform: uppercase;
      color: #111;
      text-shadow: 3px 3px 0 #ffeb3b;
    }
    p {
      margin: 0 0 20px;
      font-size: 1rem;
      line-height: 1.6;
    }
    form { display: grid; gap: 14px; }
    input, textarea {
      width: 100%;
      border: 3px solid #111;
      padding: 14px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 160px; resize: vertical; }
    .section-label {
      margin: 6px 0 0;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.4rem;
      text-transform: uppercase;
      color: #111;
      text-shadow: 2px 2px 0 #ffeb3b;
    }
    .calendar-help {
      margin: -6px 0 0;
      font-size: 0.92rem;
    }
    .date-grid {
      display: grid;
      gap: 12px;
      margin-top: 4px;
    }
    .date-card {
      border: 3px solid #111;
      background: linear-gradient(180deg, #fffdf7, #f0eadb);
      box-shadow: 4px 4px 0 #000;
      padding: 12px;
    }
    .date-card__head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .date-card__head strong {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.2rem;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .date-card__head span {
      font-size: 0.85rem;
      text-transform: uppercase;
    }
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .slot-choice {
      position: relative;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 3px solid #111;
      background: #fff;
      padding: 10px 12px;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    }
    .slot-choice:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
      background: #ffeb3b;
    }
    .slot-choice input {
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: #0050ff;
      flex: 0 0 auto;
      margin-top: 2px;
    }
    .slot-choice__content {
      flex: 1;
    }
    .slot-choice__title {
      display: block;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.02rem;
      line-height: 1.1;
      text-transform: uppercase;
    }
    .slot-choice__meta {
      display: block;
      margin-top: 4px;
      font-size: 0.88rem;
      line-height: 1.35;
    }
    .slot-choice.is-selected {
      background: #ffeb3b;
    }
    .slot-choice.is-booked {
      opacity: 0.45;
      background: #ddd;
      cursor: not-allowed;
      box-shadow: 4px 4px 0 #000;
    }
    .slot-choice.is-booked:hover {
      transform: none;
      background: #ddd;
      box-shadow: 4px 4px 0 #000;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      border: 3px solid #111;
      box-shadow: 4px 4px 0 #000;
      padding: 12px 18px;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.1rem;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
    .primary { background: #0050ff; color: #fff; }
    .secondary { background: #ffeb3b; color: #111; }
    .footer {
      margin-top: 18px;
      font-size: 0.95rem;
      text-align: center;
    }
    .message {
      display: none;
      margin: 14px 0 0;
      padding: 12px;
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>The Hulk Caesar Show</h1>
    <p>Pick as many open slots as you are available for, and we will confirm one with you.</p>

    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <input type="text" id="chatTopic" placeholder="What would you like to chat about?" required>
      <div>
        <div class="section-label">Friday Calendar</div>
        <div id="dateGrid" class="date-grid" aria-label="Preferred Friday dates"></div>
      </div>
      <textarea id="message" placeholder="Your Message" required></textarea>
      <div class="actions">
        <button class="btn primary" type="submit">Send Message</button>
        <a class="btn secondary" href="/hulk-home.html">Back to Home</a>
      </div>
      <div id="status" class="message" role="status" aria-live="polite"></div>
    </form>

    <div class="footer">Email: hulk@hulkshow.com</div>
  </main>

  <script>
    var FORMSPREE_ENDPOINT = 'https://formspree.io/f/xlgwwbld';
    var form = document.getElementById('contactForm');
    var statusBox = document.getElementById('status');
    var dateGrid = document.getElementById('dateGrid');

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getLocalDateKey(date) {
      var year = date.getFullYear();
      var month = String(date.getMonth() + 1).padStart(2, '0');
      var day = String(date.getDate()).padStart(2, '0');
      return [year, month, day].join('-');
    }

    function getNextFridaySlots(count) {
      var slots = [];
      var current = new Date();
      var targetHour = 19;
      var targetMinute = 30;
      var dayOfWeek = current.getDay();
      var daysUntilFriday = (5 - dayOfWeek + 7) % 7;

      if (daysUntilFriday === 0 && (current.getHours() > targetHour || (current.getHours() === targetHour && current.getMinutes() >= targetMinute))) {
        daysUntilFriday = 7;
      }

      current.setHours(targetHour, targetMinute, 0, 0);
      current.setDate(current.getDate() + daysUntilFriday);

      for (var index = 0; index < count; index += 1) {
        var slotDate = new Date(current);
        slotDate.setDate(current.getDate() + (index * 7));
        slots.push({
          dateKey: getLocalDateKey(slotDate),
          dateLabel: slotDate.toLocaleDateString(undefined, {
            weekday: 'long',
            month: 'short',
            day: 'numeric',
            year: 'numeric'
          }),
          featureGuestName: '',
          musicalGuestName: '',
        });
      }

      return slots;
    }

    function renderGuestBookingSlots(slots) {
      var bookingSlots = Array.isArray(slots) && slots.length ? slots : getNextFridaySlots(12);

      dateGrid.innerHTML = bookingSlots.map(function(slot) {
        var featureBooked = typeof slot.isFeatureBooked === 'boolean'
          ? slot.isFeatureBooked
          : Boolean(slot.featureGuestName);
        var musicalBooked = typeof slot.isMusicalBooked === 'boolean'
          ? slot.isMusicalBooked
          : Boolean(slot.musicalGuestName);

        return [
          '<article class="date-card" data-date-key="' + escapeHtml(slot.dateKey) + '">',
          '<div class="date-card__head">',
          '<strong>' + escapeHtml(slot.dateLabel) + '</strong>',
          '<span>7:30 PM</span>',
          '</div>',
          '<div class="slot-grid">',
          '<label class="slot-choice' + (featureBooked ? ' is-booked' : '') + '" data-slot-choice>',
          '<input type="checkbox" name="guestSlots" value="' + escapeHtml(slot.dateKey + '|feature') + '"' + (featureBooked ? ' disabled' : '') + '>',
          '<span class="slot-choice__content">',
          '<span class="slot-choice__title">Feature Guest</span>',
          '<span class="slot-choice__meta">' + (featureBooked ? 'Booked' : 'Open') + '</span>',
          '</span>',
          '</label>',
          '<label class="slot-choice' + (musicalBooked ? ' is-booked' : '') + '" data-slot-choice>',
          '<input type="checkbox" name="guestSlots" value="' + escapeHtml(slot.dateKey + '|musical') + '"' + (musicalBooked ? ' disabled' : '') + '>',
          '<span class="slot-choice__content">',
          '<span class="slot-choice__title">Musical Guest</span>',
          '<span class="slot-choice__meta">' + (musicalBooked ? 'Booked' : 'Open') + '</span>',
          '</span>',
          '</label>',
          '</div>',
          '</article>'
        ].join('');
      }).join('');

      dateGrid.querySelectorAll('input[type="checkbox"]').forEach(function(checkbox) {
        checkbox.addEventListener('change', function() {
          var parent = checkbox.closest('.slot-choice');
          if (parent) {
            parent.classList.toggle('is-selected', checkbox.checked);
          }
        });
      });
    }

    function loadGuestBookingSlots() {
      fetch('/api/guest-bookings')
        .then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) {
              throw new Error(data?.error || 'Unable to load guest booking slots.');
            }

            return data;
          });
        })
        .then(function(data) {
          renderGuestBookingSlots(data.guestBookingSlots || []);
        })
        .catch(function(error) {
          console.error('Guest booking load error:', error);
          renderGuestBookingSlots(getNextFridaySlots(12));
          statusBox.textContent = 'Could not load booked slots right now, so open Fridays are shown only.';
          statusBox.style.display = 'block';
        });
    }
    loadGuestBookingSlots();

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      var submitBtn = form.querySelector('button[type="submit"]');
      var selectedSlots = Array.from(form.querySelectorAll('input[name="guestSlots"]:checked')).map(function(input) {
        return {
          value: input.value,
          label: input.value
            .replace('|feature', ' — Feature Guest')
            .replace('|musical', ' — Musical Guest'),
        };
      });

      if (!selectedSlots.length) {
        statusBox.textContent = 'Please select at least one open Friday slot.';
        statusBox.style.display = 'block';
        return;
      }

      var data = new FormData();
      data.append('name', document.getElementById('name').value);
      data.append('email', document.getElementById('email').value);
      data.append('chat_topic', document.getElementById('chatTopic').value);
      data.append('message', document.getElementById('message').value);
      data.append('requested_slots', selectedSlots.map(function(slot) { return slot.label; }).join('\n'));
      data.append('requested_slots_count', String(selectedSlots.length));

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      statusBox.style.display = 'none';

      fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(function(response) {
        if (!response.ok) {
          return response.json().then(function(errData) { throw errData; });
        }

        form.reset();
        dateGrid.querySelectorAll('.slot-choice').forEach(function(option) {
          option.classList.remove('is-selected');
        });
        statusBox.textContent = 'Message sent. Thank you!';
        statusBox.style.display = 'block';
      }).catch(function() {
        window.location.href = 'mailto:hulk@hulkshow.com?subject=Contact%20Form%20Submission&body=' + encodeURIComponent(
          'Name: ' + document.getElementById('name').value + '\nEmail: ' + document.getElementById('email').value + '\nWhat would you like to chat about?: ' + document.getElementById('chatTopic').value + '\nRequested slots: ' + (selectedSlots.length ? selectedSlots.map(function(slot) { return slot.label; }).join(', ') : 'None selected') + '\nMessage: ' + document.getElementById('message').value
        );
      }).finally(function() {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      });
    });
  </script>
</body>
</html>
